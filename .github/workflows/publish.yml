name: Publish

on:
  release:
    types:
      - published

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Verify release targets main
        run: |
          if [ "${{ github.event.release.target_commitish }}" != "main" ]; then
            echo "::error::Release target_commitish must be main. Received: ${{ github.event.release.target_commitish }}"
            exit 1
          fi

      - name: Verify release commit is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "::error::Release commit $GITHUB_SHA is not contained in origin/main"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Verify release tag matches package version
        run: |
          node --input-type=module -e 'import { readFileSync } from "node:fs"; const pkg = JSON.parse(readFileSync("package.json", "utf8")); const tag = process.env.GITHUB_REF_NAME; if (!tag || !tag.startsWith("v")) { console.error(`Release tag must start with v. Received: ${tag ?? "<missing>"}`); process.exit(1); } const version = tag.slice(1); if (pkg.version !== version) { console.error(`package.json version ${pkg.version} does not match release tag ${tag}`); process.exit(1); }'

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

      - name: Run coverage tests
        run: npm run test:coverage

      - name: Preview npm package contents
        run: npm pack --dry-run

      - name: Publish package to npm
        run: npm publish --provenance
