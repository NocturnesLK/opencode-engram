name: Publish

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to publish
        required: true
        type: string

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release_meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.release_tag }}"
          else
            tag="${{ github.ref_name }}"
          fi

          if [ -z "$tag" ]; then
            echo "::error::Release tag is required"
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Verify release targets main
        if: github.event_name == 'release'
        run: |
          if [ "${{ github.event.release.target_commitish }}" != "main" ]; then
            echo "::error::Release target_commitish must be main. Received: ${{ github.event.release.target_commitish }}"
            exit 1
          fi

      - name: Verify release commit is on main
        run: |
          git fetch origin main
          tag="${{ steps.release_meta.outputs.tag }}"

          if ! git rev-parse "$tag" >/dev/null 2>&1; then
            git fetch --force origin "refs/tags/$tag:refs/tags/$tag"
          fi

          if ! git rev-parse "$tag" >/dev/null 2>&1; then
            echo "::error::Release tag $tag does not exist in the repository"
            exit 1
          fi

          release_sha="$(git rev-list -n 1 "$tag")"
          if ! git merge-base --is-ancestor "$release_sha" "origin/main"; then
            echo "::error::Release commit $release_sha from tag $tag is not contained in origin/main"
            exit 1
          fi

      - name: Checkout release tag contents
        run: git checkout "${{ steps.release_meta.outputs.tag }}"

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Verify release tag matches package version
        env:
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
        run: |
          node --input-type=module -e 'import { readFileSync } from "node:fs"; const pkg = JSON.parse(readFileSync("package.json", "utf8")); const tag = process.env.RELEASE_TAG; if (!tag || !tag.startsWith("v")) { console.error(`Release tag must start with v. Received: ${tag ?? "<missing>"}`); process.exit(1); } const version = tag.slice(1); if (pkg.version !== version) { console.error(`package.json version ${pkg.version} does not match release tag ${tag}`); process.exit(1); }'

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

      - name: Run coverage tests
        run: npm run test:coverage

      - name: Preview npm package contents
        run: npm pack --dry-run

      - name: Publish package to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
